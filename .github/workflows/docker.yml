name: Build and push Docker images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: BulletHeaven.Server/Dockerfile
          push: true
          tags: ghcr.io/alon-shviki/bh-api:latest

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: BulletHeaven.Client/Dockerfile
          push: true
          tags: ghcr.io/alon-shviki/bh-client:latest
